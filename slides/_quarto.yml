project:
  type: website
  output-dir: ../docs/slides

website:
  title: "IMAG Slides"
  navbar: false

format:
  revealjs:
    slide-number: true
    toc: false
    include-in-header: ../includes/head.html
    include-before-body: ../includes/header.html
    include-after-body: ../includes/footer.html
    transition: fade
    theme: default
    width: 1280
    height: 720
    css: custom.css
    footer: |
      <img src="../assets/logos/uli.jpg" alt="University of Liechtenstein">
      <img src="../assets/logos/unibz.jpg" alt="unibz">
      <img src="../assets/logos/cesim.png" alt="Cesim">
      <img src="../assets/logos/erasmus.jpg" alt="Erasmus+">
      <span class="footer-label">IMAG &mdash; Erasmus+ Project 2022-1-LI01-KA220-HED-000085536</span>
