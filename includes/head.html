<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--brand:#1e73be;--brand-dark:#165a93;--ink:#1f2937}
  html { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans"; }

  /* ── Partner-logo bar (engine & slides) ───────────────────────────

  .imag-footer-logos {
    width: 100%; display: flex; align-items: center;
    justify-content: space-around; flex-wrap: nowrap;
    padding: 6px 0; box-sizing: border-box;
  }
  .imag-footer-logos img {
    flex: 1; min-width: 0; max-width: 22%;
    max-height: var(--logo-height); height: auto; width: auto;
    object-fit: contain;
  }
